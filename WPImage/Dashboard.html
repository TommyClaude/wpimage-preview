<style>
  html, body { margin:0; height:100%; }
  body { font-family:var(--font-sans); color:var(--fg); background:var(--wp-admin-bg); }
  #root { min-height:100vh; }
  * { box-sizing:border-box; }
  button { font-family:inherit; }
  input { font-family:inherit; }
  /* number input: hide spinners for a cleaner WP look */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }

  /* WPImage: toggle slightly larger than the dense DS default, keeping DS visual
     language (off=white+gray border+dark thumb, on=theme+white thumb). Focus shows
     as an OFFSET theme ring (real gap) via outline, so the track border stays intact. */
  .wp-toggle .track { width: 40px; height: 22px; box-shadow: inset 0 0 0 1.5px var(--gray-600); }
  .wp-toggle .thumb { top: 3px; left: 3px; width: 16px; height: 16px; }
  .wp-toggle.on .thumb { left: 21px; }
  .wp-toggle:focus { outline: none; }
  .wp-toggle:focus-visible .track,
  .wp-toggle:focus .track,
  .wp-toggle.focused .track { outline: 2px solid var(--wp-admin-theme); outline-offset: 2px; }

  /* ToggleGroupControl (segmented — WordPress core). Core look: bordered white
     track; the selected option is a dark (#1e1e1e) backdrop with white text. */
  .components-toggle-group-control {
    display: inline-flex; box-sizing: border-box; min-height: 36px; padding: 3px;
    background: #fff; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  }
  .components-toggle-group-control-option {
    appearance: none; border: none; background: transparent; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0 14px; border-radius: 1px; color: var(--fg);
    font: var(--fw-medium) 13px/1 var(--font-sans);
    transition: background-color .1s ease, color .1s ease;
  }
  .components-toggle-group-control-option:hover { background: var(--gray-100); }
  .components-toggle-group-control-option.is-selected,
  .components-toggle-group-control-option.is-selected:hover { background: var(--gray-900); color: #fff; }

  /* Snackbar/toast: centered at the bottom of the content area, slides up + fades
     in, then fades out. Uses the DS .wp-snackbar surface. */
  .wpi-toast-wrap {
    position: fixed; bottom: 28px; left: 176px; right: 0; z-index: 70;
    display: flex; justify-content: center; pointer-events: none;
  }
  .wpi-toast-wrap .wp-snackbar { pointer-events: auto; gap: 10px; }
  .wpi-toast-in  { animation: wpiToastIn 0.26s cubic-bezier(.2,.8,.3,1) both; }
  .wpi-toast-out { animation: wpiToastOut 0.22s ease-in both; }
  @keyframes wpiToastIn {
    from { opacity: 0; transform: translateY(16px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes wpiToastOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wpi-toast-in, .wpi-toast-out { animation: none; }
  }
</style>
</head>
