<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WPImage — wp-admin preview harness (dev only, not shipped)</title>
<style>
/* ============================================================
   WPImage — Design tokens (from the NinjaTeam / WordPress system)
   CSS custom properties + type helpers. No component styles here:
   buttons, form controls, cards, etc. come from WordPress core.
   ============================================================ */

:root {
  /* ---------- WordPress neutrals (black & white) ---------- */
  --wp-white: #ffffff;
  --wp-black: #000000;

  /* ---------- WordPress gray scale ---------- */
  --gray-100: #f0f0f0;
  --gray-200: #e0e0e0;
  --gray-300: #dddddd;
  --gray-400: #cccccc;
  --gray-500: #aeaeae;
  --gray-600: #949494;
  --gray-700: #757575;
  --gray-800: #2f2f2f;
  --gray-900: #1e1e1e;

  /* ---------- WordPress admin theme (accent) ---------- */
  --wp-admin-theme:            #3858e9;
  --wp-admin-theme-darker-10:  #2145e6;
  --wp-admin-theme-darker-20:  #183ad6;

  /* ---------- WordPress semantic alerts ---------- */
  --alert-red:    #cc1818;
  --alert-yellow: #f0b849;
  --alert-green:  #4ab866;
  --synced-purple:#7a00df;

  /* ---------- WordPress UI surface mapping ---------- */
  --wp-admin-bg:        #f0f0f1;
  --surface:            #ffffff;
  --surface-subtle:     #fcfcfc;
  --surface-muted:      #f6f7f7;
  --border:             #e0e0e0;
  --border-strong:      #949494;
  --fg:                 #1e1e1e;
  --fg-muted:           #757575;
  --fg-disabled:        #949494;
  --focus-ring:         #3858e9;

  /* ---------- NinjaTeam brand ---------- */
  --nt-flame:   #fc794c;
  --nt-red:     #fa513c;
  --nt-deep:    #e2293b;
  --nt-brand:   #f0413e;
  --nt-slate:   #5e6577;
  --nt-gradient: linear-gradient(135deg, #fc794c 0%, #f5494a 48%, #e2293b 100%);

  /* ---------- Type families ---------- */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
  --font-mono: Menlo, Consolas, Monaco, monospace;

  /* ---------- Primitive type sizes ---------- */
  --fs-11: 11px;
  --fs-12: 12px;
  --fs-13: 13px;
  --fs-15: 15px;
  --fs-20: 20px;
  --fs-32: 32px;

  /* ---------- Line heights ---------- */
  --lh-16: 16px;
  --lh-20: 20px;
  --lh-24: 24px;
  --lh-28: 28px;
  --lh-32: 32px;
  --lh-40: 40px;

  /* ---------- Weights ---------- */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;

  /* ---------- Spacing (4px baseline) ---------- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 40px;
  --space-8: 48px;
  --space-9: 56px;

  /* ---------- Radius ---------- */
  --radius-xs:    1px;
  --radius-sm:    2px;
  --radius-md:    4px;
  --radius-lg:    8px;
  --radius-round: 9999px;
  --radius-full:  100%;

  /* ---------- Elevation ---------- */
  --elevation-x-small: 0px 1px 1px rgba(0,0,0,0.03), 0px 1px 2px rgba(0,0,0,0.02),
                       0px 3px 3px rgba(0,0,0,0.02), 0px 4px 4px rgba(0,0,0,0.01);
  --elevation-small:   0px 1px 2px rgba(0,0,0,0.04), 0px 3px 3px rgba(0,0,0,0.03),
                       0px 6px 4px rgba(0,0,0,0.02), 0px 11px 5px rgba(0,0,0,0.01);
  --elevation-medium:  0px 2px 3px rgba(0,0,0,0.05), 0px 6px 6px rgba(0,0,0,0.04),
                       0px 13px 8px rgba(0,0,0,0.02), 0px 24px 10px rgba(0,0,0,0.01);
  --elevation-large:   0px 4px 6px rgba(0,0,0,0.06), 0px 14px 12px rgba(0,0,0,0.05),
                       0px 32px 18px rgba(0,0,0,0.03), 0px 56px 22px rgba(0,0,0,0.01);
}

/* ---------- Semantic type helpers (used by the app) ---------- */
.wpimage-app .t-mono { font: var(--fw-regular) var(--fs-13)/var(--lh-20) var(--font-mono); color: var(--fg); }

</style>
<style>
/* ============================================================
   WPImage — admin component layer (scoped to .wpimage-app)

   This file intentionally does NOT restyle buttons, text inputs,
   checkboxes, radios, selects or the admin shell — WordPress core
   already provides those. It ships only the WPImage-specific UI:
   cards, settings panels, badges, the toggle, segmented control,
   stat cards, trend chart, tabs, the dropdown menu, snackbar, the
   brand hero, icons, and a few wp-admin integration tweaks.
   ============================================================ */

/* ---------- wp-admin integration ---------- */
.wpimage-wrap { margin: 0; max-width: none; }
body.toplevel_page_wpimage #wpcontent { padding-left: 0; }
body.toplevel_page_wpimage #wpbody-content { padding-bottom: 0; }
.wpimage-app { font-family: var(--font-sans); color: var(--fg); background: var(--wp-admin-bg); min-height: calc(100vh - 32px); }
.wpimage-app *, .wpimage-app *::before, .wpimage-app *::after { box-sizing: border-box; }
.wpimage-app a { box-shadow: none; }
.wpimage-loading { display: flex; align-items: center; gap: 8px; padding: 48px 32px; color: var(--fg-muted); font: 13px/1.4 var(--font-sans); }

/* ---------- Loading skeleton (shown before the React app mounts) ----------
   Pure HTML/CSS (no JS) so it paints immediately on page load / reload and
   mirrors the real layout — header (logo + title + buttons + tabs) AND the
   dashboard body (hero + stat cards + panels) — so nothing shifts when React
   mounts. app.jsx clears #wpimage-root (innerHTML='') when React mounts. */
.wpi-sk { position: relative; overflow: hidden; display: block; background: var(--gray-200); border-radius: var(--radius-sm); }
.wpi-sk::after {
  content: ""; position: absolute; inset: 0; transform: translateX(-100%);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
  animation: wpiShimmer 1.4s ease-in-out infinite;
}
@keyframes wpiShimmer { 100% { transform: translateX(100%); } }

/* Header bar (full-width white, matches .wpi-pageheader) */
.wpi-sk-header { background: #fff; border-bottom: 1px solid var(--border); padding: 20px 32px 0; }
.wpi-sk-headrow { display: flex; align-items: center; gap: 14px; max-width: 1080px; margin: 0 auto 16px; }
.wpi-sk-headrow .sk-logo { width: 36px; height: 36px; flex: none; border-radius: var(--radius-md); }
.wpi-sk-headrow .sk-titles { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.wpi-sk-headrow .sk-title { width: 150px; height: 20px; }
.wpi-sk-headrow .sk-subtitle { width: 220px; height: 12px; }
.wpi-sk-headrow .sk-btns { display: flex; gap: 8px; flex: none; }
.wpi-sk-headrow .sk-btn { width: 118px; height: 30px; border-radius: var(--radius-sm); }
.wpi-sk-tabs { display: flex; gap: 28px; max-width: 1080px; margin: 0 auto; padding-top: 14px; }
.wpi-sk-tabs .sk-tab { width: 88px; height: 16px; margin-bottom: 14px; }

/* Body (capped + centered, matches .wpi-page) */
.wpi-sk-body { max-width: 1080px; margin: 0 auto; padding: 28px 32px 64px; }
/* Hero: a simple plain block (no inner detail) at the real banner's height */
.wpi-sk-hero {
  min-height: 340px; margin-bottom: 24px; border-radius: 16px;
  background: linear-gradient(135deg, #e7e8ec, #dcdee3);
}

.wpi-sk-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.wpi-sk-stat { display: flex; flex-direction: column; gap: 12px; padding: 20px;
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); }
.wpi-sk-stat .sk-ico { width: 40px; height: 40px; border-radius: var(--radius-md); }
.wpi-sk-stat .sk-num { width: 58%; height: 26px; }
.wpi-sk-stat .sk-sub { width: 40%; height: 12px; }

/* Bottom two cards: same column ratio + height as the real .wpi-twocol, stretched equal */
.wpi-sk-cols { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; align-items: stretch; }
.wpi-sk-panel { display: flex; flex-direction: column; gap: 16px; padding: 24px; min-height: 268px;
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); }
.wpi-sk-panel .sk-h { width: 42%; height: 18px; }
.wpi-sk-panel .sk-fill { flex: 1; width: 100%; background: var(--gray-100); border-radius: var(--radius-sm); }

@media (max-width: 960px) {
  .wpi-sk-stats { grid-template-columns: repeat(2, 1fr); }
  .wpi-sk-cols { grid-template-columns: 1fr; }
}
/* Tablet band: real hero text wraps and grows taller than its 340 min-height */
@media (max-width: 960px) and (min-width: 783px) {
  /* Real hero text wraps and grows taller than 340 in this band */
  .wpi-sk-hero { min-height: 460px; }
  .wpi-sk-cols { grid-template-columns: 1fr; }
}
@media (max-width: 782px) {
  .wpi-sk-header { padding: 16px 16px 0; }
  .wpi-sk-body { padding: 20px 16px 56px; }
  .wpi-sk-headrow .sk-btns { display: none; }
  .wpi-sk-tabs { overflow: hidden; }
  .wpi-sk-hero { min-height: 300px; }
  .wpi-sk-cols { grid-template-columns: 1fr; }
}
@media (max-width: 600px) { .wpi-sk-stats { grid-template-columns: 1fr; } }
@media (prefers-reduced-motion: reduce) { .wpi-sk::after { animation: none; } }

/* Number input: hide spinners for a cleaner look */
.wpimage-app input[type=number]::-webkit-outer-spin-button,
.wpimage-app input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* ---------- WordPress core buttons: align our inline icons ---------- */
.wpimage-app .button,
.wpimage-app .button-primary,
.wpimage-app .button-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  vertical-align: middle;
}
.wpimage-app .button .nt-ic { width: 18px; height: 18px; }
.wpimage-app .button.button-small .nt-ic { width: 15px; height: 15px; }
.wpimage-app .button.is-active { border-color: var(--wp-admin-theme); color: var(--wp-admin-theme); box-shadow: 0 0 0 1px var(--wp-admin-theme); }
.wpimage-app .button-link { display: inline-flex; align-items: center; gap: 4px; }
.wpimage-app .small-text { text-align: right; }

/* ---------- Header utility buttons (Submit your idea = minimal, Support = outline) ---------- */
/* Both share the same box so the two read as an equal pair, regardless of their
   underlying core variant (tertiary vs button-small). Selectors are written with
   enough specificity to beat the base .components-button.is-tertiary height. */
.wpimage-app .wpi-brand-more { position: relative; flex: none; }
.wpimage-app .wpi-brand-actions { display: flex; align-items: center; gap: 8px; }
.wpimage-app .wpi-head-btn,
.wpimage-app a.wpi-head-btn.components-button.is-tertiary,
.wpimage-app .wpi-head-btn.button.button-small {
  min-height: 30px; height: 30px; padding: 0 10px; gap: 5px;
  font-size: 12px; line-height: 1; flex: none; text-decoration: none;
  border-radius: var(--radius-sm);
}
.wpimage-app a.wpi-head-btn.components-button.is-tertiary { color: var(--wp-admin-theme); }
.wpimage-app a.wpi-head-btn.components-button.is-tertiary:hover { background: rgba(56,88,233,.06); color: var(--wp-admin-theme-darker-10); }
.wpimage-app .wpi-head-btn .nt-ic { width: 15px !important; height: 15px !important; }
/* Kebab (3-dot) trigger — hidden on desktop, shown on mobile */
.wpimage-app .wpi-head-kebab {
  display: none; align-items: center; justify-content: center; width: 36px; height: 36px;
  padding: 0; border: none; background: none; cursor: pointer; color: var(--fg-muted);
  border-radius: var(--radius-sm); transition: background .1s, color .1s;
}
.wpimage-app .wpi-head-kebab:hover { background: var(--gray-100); color: var(--fg); }
.wpimage-app .wpi-head-kebab .nt-ic { width: 20px; height: 20px; }

/* ---------- Recolor native WP buttons to the WPImage / design-system palette ----------
   We keep the native .button / .button-primary / .button-link markup (no custom
   button component), and only override the color tokens so the buttons match the
   design system's theme blue (#3858e9) instead of the default WP admin blue. */
.wpimage-app .button,
.wpimage-app .button-secondary {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 36px; padding: 0 12px; line-height: 1;
  border-radius: var(--radius-sm);
  border-color: var(--wp-admin-theme);
  color: var(--wp-admin-theme);
  background: #fff;
}
.wpimage-app .button:hover,
.wpimage-app .button-secondary:hover {
  border-color: var(--wp-admin-theme-darker-10);
  color: var(--wp-admin-theme-darker-10);
  background: rgba(56,88,233,.04);
}
.wpimage-app .button:focus {
  border-color: var(--wp-admin-theme);
  box-shadow: 0 0 0 1px var(--wp-admin-theme);
  outline: 2px solid transparent;
}
.wpimage-app .button-primary {
  border-radius: var(--radius-sm);
  background: var(--wp-admin-theme);
  border-color: var(--wp-admin-theme);
  color: #fff;
}
.wpimage-app .button-primary:hover,
.wpimage-app .button-primary:focus {
  background: var(--wp-admin-theme-darker-10);
  border-color: var(--wp-admin-theme-darker-10);
  color: #fff;
}
.wpimage-app .button-primary:active { background: var(--wp-admin-theme-darker-20); border-color: var(--wp-admin-theme-darker-20); }
.wpimage-app .button-link { color: var(--wp-admin-theme); }
.wpimage-app .button-link:hover, .wpimage-app .button-link:focus { color: var(--wp-admin-theme-darker-20); }
.wpimage-app .button:disabled:not(.is-busy),
.wpimage-app .button[disabled]:not(.is-busy),
.wpimage-app .button[aria-disabled="true"]:not(.is-busy) { color: var(--fg-disabled) !important; border-color: var(--gray-300) !important; background: var(--surface-muted) !important; cursor: default; }
.wpimage-app .button.is-busy { cursor: default; }

/* ---------- Tertiary / "Minimal" button (WordPress core Button is-tertiary) ----------
   Borderless, theme-blue text, no underline, faint blue hover fill. Matches the
   @wordpress/components Button `tertiary` variant (used for the Reset action). */
.wpimage-app .components-button.is-tertiary {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  box-sizing: border-box; min-height: 36px; padding: 0 12px;
  border: none; border-radius: var(--radius-sm); background: transparent;
  font: var(--fw-regular) 13px/1 var(--font-sans); color: var(--wp-admin-theme);
  cursor: pointer; text-decoration: none;
}
.wpimage-app .components-button.is-tertiary:hover { background: rgba(56,88,233,.04); color: var(--wp-admin-theme-darker-10); }
.wpimage-app .components-button.is-tertiary.is-small { min-height: 24px; padding: 0 8px; gap: 4px; font-size: 11px; }
.wpimage-app .components-button.is-tertiary.is-small .nt-ic { width: 16px; height: 16px; }
.wpimage-app .components-button.is-tertiary:focus { outline: none; box-shadow: 0 0 0 1.5px var(--wp-admin-theme); }
.wpimage-app .components-button.is-tertiary:disabled { color: var(--fg-disabled); background: transparent; cursor: default; }

/* ---------- Busy state (WordPress core Button isBusy) ----------
   Animated diagonal stripe shown while an action is processing. Overrides the
   disabled background (which is !important) so it shows even when disabled. */
@keyframes wpimage-busy { 0% { background-position: 200px 0; } 100% { background-position: 0 0; } }
.wpimage-app .button.is-busy,
.wpimage-app .button.is-busy:disabled,
.wpimage-app .button.is-busy[disabled],
.wpimage-app .button-primary.is-busy,
.wpimage-app .button-primary.is-busy:disabled,
.wpimage-app .button-primary.is-busy[disabled] {
  animation: wpimage-busy 2500ms infinite linear;
  background-size: 100px 100% !important;
  opacity: 1;
}
.wpimage-app .button.is-busy,
.wpimage-app .button.is-busy:disabled,
.wpimage-app .button.is-busy[disabled] {
  color: var(--wp-admin-theme) !important;
  border-color: var(--border-strong) !important;
  background-image: linear-gradient(-45deg, var(--gray-100) 28%, #fff 28%, #fff 72%, var(--gray-100) 72%) !important;
}
.wpimage-app .button-primary.is-busy,
.wpimage-app .button-primary.is-busy:disabled,
.wpimage-app .button-primary.is-busy[disabled] {
  color: #fff !important;
  border-color: var(--wp-admin-theme) !important;
  background-image: linear-gradient(-45deg, var(--wp-admin-theme) 28%, var(--wp-admin-theme-darker-20) 28%, var(--wp-admin-theme-darker-20) 72%, var(--wp-admin-theme) 72%) !important;
}
@media (prefers-reduced-motion: reduce) {
  .wpimage-app .button.is-busy, .wpimage-app .button-primary.is-busy { animation: none; }
}

/* ---------- Icons (WordPress @wordpress/icons set, inline SVG) ---------- */
.wpimage-app .nt-ic { display: inline-flex; width: 24px; height: 24px; flex: none; line-height: 0; color: inherit; }
.wpimage-app .nt-ic > svg { width: 100%; height: 100%; display: block; }
.wpimage-app .nt-ic.sm { width: 20px; height: 20px; }
.wpimage-app .nt-ic.xs { width: 16px; height: 16px; }

/* ---------- Card (WordPress core Card — .components-card) ---------- */
.wpimage-app .components-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--elevation-x-small); overflow: hidden; }
.wpimage-app .components-card__header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.wpimage-app .components-card__header h3 { margin: 0; font: var(--fw-semibold) 15px/1.4 var(--font-sans); }

/* ---------- Panel (settings rows) ---------- */
.wpimage-app .wp-panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); }
.wpimage-app .wp-panel-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.wpimage-app .wp-panel-row:last-child { border-bottom: none; }
.wpimage-app .wp-panel-row .meta { display: flex; flex-direction: column; gap: 2px; }
.wpimage-app .wp-panel-row .meta .ttl { font: var(--fw-medium) 13px/1.4 var(--font-sans); color: var(--fg); }
.wpimage-app .wp-panel-row .meta .sub { font: 12px/1.4 var(--font-sans); color: var(--fg-muted); }

/* ---------- Small uppercase label ---------- */
.wpimage-app .wp-label { font: var(--fw-medium) 11px/1.4 var(--font-sans); text-transform: uppercase; letter-spacing: .02em; color: var(--fg); }

/* ---------- Badge (WordPress core @wordpress/components Badge) ----------
   Genuine `components-badge` markup with intent modifiers. Values match the
   Gutenberg Badge: a small, solid subtle-tint pill · 2px radius. */
.wpimage-app .components-badge {
  display: inline-flex; align-items: center; gap: 4px; box-sizing: border-box;
  height: 24px; padding: 0 8px; border-radius: 2px;
  font: var(--fw-medium) 12px/1 var(--font-sans);
}
.wpimage-app .components-badge .nt-ic { width: 14px; height: 14px; margin-left: -1px; }
.wpimage-app .components-badge.is-default { background: var(--gray-100); color: var(--gray-800); }
.wpimage-app .components-badge.is-info    { background: #e9edfb; color: var(--wp-admin-theme-darker-20); }
.wpimage-app .components-badge.is-success { background: #e5f4ea; color: #1a7a3e; }
.wpimage-app .components-badge.is-warning { background: #fbf3e2; color: #946200; }
.wpimage-app .components-badge.is-error   { background: #fbeaea; color: var(--alert-red); }

/* ---------- Toggle ---------- */
/* The toggle uses the genuine WordPress core FormToggle component
   (.components-form-toggle), styled by the `wp-components` stylesheet that
   WordPress ships and we enqueue. We add only the WP 7 core focus ring, which
   some bundled wp-components builds omit: a white gap + theme outline around the
   track whenever the underlying checkbox is focused (click or keyboard). */
.wpimage-app .components-form-toggle__input:focus + .components-form-toggle__track {
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--wp-admin-theme);
  outline: 2px solid transparent; /* high-contrast-mode fallback */
}

/* ---------- ToggleGroupControl (segmented — WordPress core) ----------
   Genuine `components-toggle-group-control` markup. Core look: a bordered
   white track; the selected option is a dark (#1e1e1e) backdrop with white
   text. Matches @wordpress/components ToggleGroupControl. */
.wpimage-app .components-toggle-group-control {
  display: inline-flex; box-sizing: border-box; min-height: 36px; padding: 3px;
  background: #fff; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
}
.wpimage-app .components-toggle-group-control-option {
  appearance: none; border: none; background: transparent; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 28px; padding: 0 14px; border-radius: 1px;
  font: var(--fw-regular) 13px/1 var(--font-sans); color: var(--fg);
  transition: background-color .1s ease, color .1s ease;
}
.wpimage-app .components-toggle-group-control-option:hover { background: var(--gray-100); }
.wpimage-app .components-toggle-group-control-option.is-selected { background: var(--gray-900); color: #fff; }
.wpimage-app .components-toggle-group-control-option.is-selected:hover { background: var(--gray-900); }

/* ---------- CheckboxControl (WordPress core) ----------
   Genuine `components-checkbox-control` markup: a real (visually-hidden)
   <input type=checkbox> for semantics + a visible box span whose checked
   state is driven by the control's `is-checked` class (mirrors how the core
   CheckboxControl overlays its check icon). */
.wpimage-app .components-checkbox-control { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font: 13px/1.43 var(--font-sans); color: var(--fg); position: relative; }
.wpimage-app .components-checkbox-control__input {
  position: absolute; left: 0; top: 0; width: 16px; height: 16px; margin: 0; opacity: 0; pointer-events: none;
}
.wpimage-app .components-checkbox-control__box {
  flex: none; width: 16px; height: 16px; box-sizing: border-box; background: #fff;
  border: 1px solid var(--gray-700); border-radius: 2px; position: relative;
  transition: background-color .1s, border-color .1s;
}
.wpimage-app .components-checkbox-control.is-checked .components-checkbox-control__box { background: var(--wp-admin-theme); border-color: var(--wp-admin-theme); }
.wpimage-app .components-checkbox-control.is-checked .components-checkbox-control__box::after {
  content: ""; position: absolute; left: 50%; top: 50%; width: 4px; height: 8px;

<script>
  /* Reproduce WordPress admin-menu collapse + mobile hamburger for the preview.
     Desktop: #collapse-menu toggles body.folded (icon rail).
     Mobile (≤782px): #menu-toggle-btn toggles body.menu-open (off-canvas). */
  (function () {
    var body = document.body;
    var collapse = document.getElementById('collapse-menu');
    var toggle = document.getElementById('menu-toggle-btn');
    var scrim = document.getElementById('wp-menu-scrim');
    var FOLD_KEY = 'wpimage-preview-folded';

    // Restore persisted desktop fold state
    if (localStorage.getItem(FOLD_KEY) === '1') body.classList.add('folded');

    collapse.addEventListener('click', function () {
      var folded = body.classList.toggle('folded');
      collapse.setAttribute('aria-expanded', String(!folded));
      localStorage.setItem(FOLD_KEY, folded ? '1' : '0');
    });

    function openMenu(open) {
      body.classList.toggle('menu-open', open);
      toggle.setAttribute('aria-expanded', String(open));
    }
    toggle.addEventListener('click', function () { openMenu(!body.classList.contains('menu-open')); });
    scrim.addEventListener('click', function () { openMenu(false); });
    // Close the mobile menu after choosing an item
    document.getElementById('adminmenu-list').addEventListener('click', function () {
      if (window.matchMedia('(max-width:782px)').matches) openMenu(false);
    });
    // Reset mobile state when crossing back to desktop
    window.matchMedia('(max-width:782px)').addEventListener('change', function (e) {
      if (!e.matches) openMenu(false);
    });
  })();
</script>

    (root||document).querySelectorAll('.nt-ic').forEach(function(el){
      if(el.getAttribute('data-ic-done')) return;
      var name=null;
      el.classList.forEach(function(c){ if(c.indexOf('ic-')===0) name=c.slice(3); });
      if(!name||!P[name]) return;
      el.innerHTML='<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" style="display:block">'+P[name]+'</svg>';
      el.setAttribute('data-ic-done','1');

<script type="text/babel">
// components.jsx — shared UI for the WPImage admin app (forked from the
// NinjaTeam WordPress plugin admin UI kit). Buttons use native WordPress
// core classes (.button / .button-primary / .button-link); only the
// WPImage-specific composites are styled here. Style objects are uniquely
// named to avoid global collisions across babel scripts.

/* ---------------- Icon (inline WP SVG via icons.js) ---------------- */
function Ic({ name, cls = '', style }) {
  const inner = (window.NTIcons && window.NTIcons.paths[name]) || '';
  return (
    <i className={'nt-ic ' + cls} style={style}
       dangerouslySetInnerHTML={{ __html:
         `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" style="display:block">${inner}</svg>` }} />
  );
}

/* ---------------- Toggle (WordPress core FormToggle) ---------------- */
// Renders the genuine @wordpress/components FormToggle markup. Styling comes
// from WordPress core's `wp-components` stylesheet (enqueued in wpimage.php),
// so this matches the user's WordPress version exactly.
function Toggle({ on, onChange, disabled }) {
  return (
    <span className={'components-form-toggle' + (on ? ' is-checked' : '') + (disabled ? ' is-disabled' : '')}>
      <input className="components-form-toggle__input" type="checkbox" checked={on} disabled={disabled}
        aria-checked={on} onChange={() => !disabled && onChange(!on)} />
      <span className="components-form-toggle__track"></span>
      <span className="components-form-toggle__thumb"></span>
    </span>
  );
}

/* ---------------- Section card (titled panel) ---------------- */
function SectionCard({ title, sub, icon, action, children, pad = true, style, bodyStyle }) {
  return (
    <div className="components-card" style={{ marginBottom:20, ...style }}>
      {title && (
        <div className="components-card__header">
          <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
            {icon && <span style={{ color:'var(--fg-muted)', display:'flex' }}><Ic name={icon} cls="sm" /></span>}

      <div style={{ height:6, borderRadius:9999, background:'var(--gray-200)', overflow:'hidden' }}>
        <div style={{ height:'100%', width:pct + '%', borderRadius:9999,
          background: pct > 85 ? 'var(--alert-red)' : 'var(--wp-admin-theme)' }} />
      </div>
    </div>
  );
}

/* ---------------- Trend chart (optimizations over time) ---------------- */
function TrendChart({ data, locked }) {
  const W = 560, H = 132, pad = { l:0, r:0, t:10, b:18 };
  const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
  const max = Math.max(...data.map(d => d.v));
  const bw = innerW / data.length;
  return (
    <div style={{ position:'relative', userSelect: locked ? 'none' : 'auto' }} aria-hidden={locked ? 'true' : undefined}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display:'block', overflow:'visible' }}>
        {[0, 0.5, 1].map((g, i) => (
          <line key={i} x1={0} x2={W} y1={pad.t + innerH * g} y2={pad.t + innerH * g}
            stroke="var(--gray-200)" strokeWidth="1" />
        ))}
        {data.map((d, i) => {
          const h = Math.max(2, (d.v / max) * innerH);
          const x = pad.l + i * bw + bw * 0.18;
          const w = bw * 0.64;
          const y = pad.t + innerH - h;
          const fill = locked
            ? 'var(--gray-200)'
            : (d.hi ? 'var(--wp-admin-theme)' : 'rgba(56,88,233,0.32)');
          return (
            <g key={i}>
              <rect x={x} y={y} width={w} height={h} rx="1.5" fill={fill} />
              {d.label && !locked && <text x={x + w / 2} y={H - 4} textAnchor="middle"
                fontSize="10" fill="var(--fg-muted)" fontFamily="var(--font-sans)">{d.label}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ---------------- ToggleGroupControl (segmented — WordPress core) ---------------- */
function SegControl({ value, options, onChange }) {
  return (
    <div className="components-toggle-group-control" role="radiogroup">
      {options.map(o => {
        const v = typeof o === 'object' ? o.value : o;
        const l = typeof o === 'object' ? o.label : o;
        const active = v === value;
        return (
          <button key={v} type="button" role="radio" aria-checked={active}
            className={'components-toggle-group-control-option' + (active ? ' is-selected' : '')}
            onClick={()=>onChange(v)}>{l}</button>
        );
      })}
    </div>
  );
}

/* ---------------- Info tooltip ((?) icon + hover bubble) ---------------- */
function InfoTip({ text }) {
  const [show, setShow] = React.useState(false);
  return (
    <span style={{ position:'relative', display:'inline-flex', verticalAlign:'middle', marginLeft:5 }}
      onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>

          transform:'translateX(-50%)', width:264, background:'var(--gray-900)', color:'#fff',
          font:'var(--fw-regular) 12px/1.55 var(--font-sans)', textTransform:'none', letterSpacing:0,
          padding:'10px 12px', borderRadius:4, boxShadow:'var(--elevation-medium)', zIndex:60 }}>
          {text}
          <span style={{ position:'absolute', bottom:'100%', left:'50%', transform:'translateX(-50%)',
            borderWidth:5, borderStyle:'solid', borderColor:'transparent transparent var(--gray-900) transparent' }} />
        </span>
      )}
    </span>
  );
}

/* ---------------- Lock overlay (covers a region when logged out) ---------------- */
function LockOverlay({ onLogin }) {
  return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', zIndex:5, pointerEvents:'none' }}>

        <span style={{ width:38, height:38, borderRadius:9999, background:'var(--surface-subtle, #f0f0f1)',
          border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--fg-muted)' }}>
          <Ic name="lock" cls="sm" />
        </span>
        <span style={{ font:'var(--fw-medium) 13px/1 var(--font-sans)', color:'var(--fg)' }}>Login to view your stats</span>
        <button className="button button-primary button-small" onClick={onLogin}>Login to sync</button>
      </div>
    </div>
  );
}

Object.assign(window, { Ic, Toggle, SectionCard, SettingRow, StatCard, QuotaBar, TrendChart, SegControl, InfoTip, LockOverlay });

function LoginModal({ open, mode = 'login', markVariant = 'blue', onClose, onLogin }) {
  const Ic = window.Ic;

    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;

  const isSignup = view === 'signup';

          </div>

          <div className="wpi-auth-divider"><span>or</span></div>

          <form className="wpi-auth-form" onSubmit={submit}>
            {isSignup && (
              <div className="components-base-control">
                <label className="components-base-control__label" htmlFor="wpi-auth-name">Full name</label>
                <input id="wpi-auth-name" type="text" className="components-text-control__input" defaultValue="Jordan Miles" />

            <div className="components-base-control">
              <label className="components-base-control__label" htmlFor="wpi-auth-email">Email</label>
              <input id="wpi-auth-email" type="email" className="components-text-control__input"
                placeholder="you@yoursite.com" defaultValue="you@yoursite.com" />
            </div>
            <div className="components-base-control">
              <label className="components-base-control__label" htmlFor="wpi-auth-pass">Password</label>
              <input id="wpi-auth-pass" type="password" className="components-text-control__input" defaultValue="optimize" />
            </div>
            {!isSignup && (
              <div className="wpi-auth-row">

                <a href="#" onClick={(e) => e.preventDefault()}>Forgot password?</a>
              </div>
            )}
            <button type="submit" className="button button-primary wpi-auth-submit">{copy.submit}</button>
          </form>

          <p className="wpi-auth-foot">{copy.footPrompt}{' '}
            <button type="button" className="components-button is-link"
              onClick={() => setView(copy.footTo)}>{copy.footLink}</button>
          </p>
        </div>
      </div>
    </div>
  );
}

    if (open && ref.current) {
      const r = ref.current.getBoundingClientRect();
      setDropUp((window.innerHeight - r.bottom) < 300);
    }
  }, [open]);
  const names = WP_SIZES.filter(o => selected.includes(o.id)).map(o => o.name);
  const summary = names.length ? names.join(', ') : 'Select image sizes to optimize';
  return (
    <div ref={ref} style={{ position:'relative', maxWidth:440 }}>
      <button type="button" className="wp-select" onClick={()=>setOpen(o=>!o)}
        style={{ display:'flex', alignItems:'center', textAlign:'left', cursor:'pointer', background:'#fff' }}>
        {names.length > 0 && (
          <span className="components-badge is-info" style={{ minHeight:20, marginRight:8, flex:'none' }}>{names.length}</span>
        )}
        <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', lineHeight:1.5,
          color: names.length ? 'var(--fg)' : 'var(--fg-muted)' }}>{summary}</span>
      </button>
      {open && (
        <div className="wpi-menu" style={{ position:'absolute', left:0, right:0, zIndex:100,
          ...(dropUp ? { bottom:'calc(100% + 4px)' } : { top:'calc(100% + 4px)' }) }}>
          {WP_SIZES.map(o => <OptRow key={o.id} o={o} on={selected.includes(o.id)} toggle={toggle} />)}
        </div>
      )}
    </div>
  );
}

function SettingsPage({ compression, setCompression, settings, set, toggleSize, saving, save, dirty, onReset }) {
  const COMPRESSION_HINT = {
    Lossy:    'Smallest files, ideal for the web — minor quality loss that is rarely visible.',
    Glossy:   'Balanced — near-original quality with strong savings. Recommended for most sites.',
    Lossless: 'Preserves maximum quality with no visible loss. Files stay larger than lossy or glossy.',
  };
  return (
    <div className="wpi-page" style={wpiPage.page}>
      {/* General settings */}
      <div style={wpiPage.sectTitle}>General settings</div>
      <SectionCard pad={false}>
        <div className="wp-panel" style={{ border:'none', borderRadius:8 }}>
          <SettingRow title="Auto-optimize images on upload"
            sub="Automatically optimize every image you upload to WordPress.">
            <Toggle on={settings.autoOptimize} onChange={v=>set('autoOptimize',v)} />
          </SettingRow>
          <SettingRow last title="Backup original images"
            sub="Keep your original images in a separate folder before the optimization process.">
            <Toggle on={settings.backup} onChange={v=>set('backup',v)} />
          </SettingRow>
        </div>
      </SectionCard>

      {/* Optimization */}
      <div style={wpiPage.sectTitle}>Optimization</div>
      <SectionCard pad={false} style={{ overflow:'visible' }}>
        <div className="wp-panel" style={{ border:'none', borderRadius:'8px 8px 0 0' }}>
          <SettingRow title="Compression level"
            sub={COMPRESSION_HINT[compression]}>
            <SegControl value={compression} options={['Lossy','Glossy','Lossless']}
              onChange={v=>setCompression(v)} />
          </SettingRow>
          <SettingRow title="WebP"
            sub="Create WebP versions of your images and serve them automatically to supported browsers.">
            <Toggle on={settings.webp} onChange={v=>set('webp',v)} />
          </SettingRow>
          <SettingRow last={!settings.resize}
            title={<>Resize larger images<InfoTip text="You can save up to 80% after resizing. The new width should not be less than your largest thumbnail width (currently 2048px). Resizing runs on upload or during optimization." /></>}
            sub="Recommended to reduce larger images.">
            <Toggle on={settings.resize} onChange={v=>set('resize',v)} />
          </SettingRow>
          {settings.resize && (
            <div className="wp-panel-row" style={{ borderBottom:'none', background:'var(--surface-subtle)' }}>
              <div className="meta"><span className="ttl">Maximum width</span>
                <span className="sub">Images wider than this are scaled down on optimization.</span></div>
              <div style={{ display:'flex', alignItems:'center', gap:8, flex:'none' }}>
                <input className="small-text" type="number" value={settings.resizeW}
                  onChange={e=>set('resizeW', e.target.value)} style={{ width:96 }} />
                <span style={{ font:'13px/1 var(--font-sans)', color:'var(--fg-muted)' }}>px</span>
              </div>
            </div>
          )}
        </div>
        <div style={{ padding:16, borderTop:'1px solid var(--border)' }}>
          <div style={{ font:'var(--fw-medium) 13px/1.4 var(--font-sans)', marginBottom:3, display:'flex', alignItems:'center' }}>Files optimization<InfoTip text="Optimizing more sizes saves more space but uses more of your monthly quota." /></div>
          <div style={{ font:'12px/1.5 var(--font-sans)', color:'var(--fg-muted)', marginBottom:14, maxWidth:640 }}>
            Choose which image sizes created by WordPress should be optimized.
          </div>
          <FilesOptimization selected={settings.sizes} toggle={toggleSize} />
        </div>
      </SectionCard>

      <div className="wpi-savebar" style={wpiPage.saveBar}>
        <span style={{ font:'12px/1.4 var(--font-sans)', color:'var(--fg-muted)', marginRight:'auto', display:'inline-flex', alignItems:'center', gap:6, minHeight:16 }}>
          {dirty && (<><span style={{ width:6, height:6, borderRadius:9999, background:'var(--alert-yellow)', flex:'none' }}></span>You have unsaved changes</>)}
        </span>
        <button className="components-button is-tertiary" onClick={onReset} disabled={saving} title="Restore default settings">Reset to defaults</button>
        <button className={'button button-primary' + (saving ? ' is-busy' : '')} onClick={()=>{ if(!saving && dirty) save(); }} aria-disabled={saving || !dirty}>
          {saving ? 'Saving…' : 'Save changes'}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   Plugin shell (header + tabs + page state)
   ============================================================ */
const WPI_DEFAULT_SETTINGS = { autoOptimize:true, backup:true, webp:false, resize:false, resizeW:2048, sizes:[] };
const WPI_DEFAULT_COMPRESSION = 'Glossy';

function PluginShell() {
  const t = WPI_CONFIG;
  const [compression, setCompressionState] = React.useState(WPI_DEFAULT_COMPRESSION);
  const [synced, setSynced] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [loginOpen, setLoginOpen] = React.useState(false);
  const [authMode, setAuthMode] = React.useState('login');
  const openLogin = (mode = 'login') => { setAuthMode(mode); setLoginOpen(true); };
  const [toast, setToast] = React.useState(null);
  const [tab, setTab] = React.useState('dashboard');
  const [moreOpen, setMoreOpen] = React.useState(false);
  React.useEffect(() => {
    if (!moreOpen) return;
    const onDocClick = (e) => {
      if (e.target.closest && e.target.closest('.wpi-brand-more')) return;
      setMoreOpen(false);
    };
    const id = setTimeout(() => document.addEventListener('click', onDocClick), 0);
    return () => { clearTimeout(id); document.removeEventListener('click', onDocClick); };
  }, [moreOpen]);
  const [settings, setSettings] = React.useState(() => ({ ...WPI_DEFAULT_SETTINGS }));
  const [saving, setSaving] = React.useState(false);
  const [dirty, setDirty] = React.useState(false);
  const set = (k,v) => { setSettings(s => ({ ...s, [k]:v })); setDirty(true); };
  const setCompression = (v) => { setCompressionState(v); setDirty(true); };
  const toggleSize = (id) => set('sizes', settings.sizes.includes(id) ? settings.sizes.filter(x=>x!==id) : [...settings.sizes, id]);

  const fireToast = (msg) => {
    setToast({ msg, leaving:false });
    clearTimeout(window.__wpiT); clearTimeout(window.__wpiTout);
    window.__wpiT = setTimeout(() => {
      setToast(t => t ? { ...t, leaving:true } : null);
      window.__wpiTout = setTimeout(() => setToast(null), 230);
    }, 2800);
  };
  const save = () => { setSaving(true); setTimeout(()=>{ setSaving(false); setDirty(false); fireToast('Settings saved. Your changes are now live on the site.'); }, 2000); };
  const resetToDefaults = () => {
    setSettings({ ...WPI_DEFAULT_SETTINGS });
    setCompressionState(WPI_DEFAULT_COMPRESSION);
    setDirty(true);
  };
  const onLogin = () => {
    setLoginOpen(false);
    setSyncing(true);
    setTimeout(()=>{ setSyncing(false); setSynced(true); fireToast('Account synced. API key retrieved.'); }, 2000);
  };
  const onDisconnect = () => { setSynced(false); fireToast('Account disconnected.'); };

  const tabs = [
    { id:'dashboard', label:'Dashboard', icon:'dashboard' },
    { id:'settings',  label:'Settings',  icon:'settings' },
    { id:'plugins',   label:'About us', icon:'people' },
  ];

  return (
    <React.Fragment>
      <div className="wpi-pageheader" style={{ ...wpiPage.header, paddingBottom:0 }}>
        <div className="wpi-brand" style={{ ...wpiPage.brand, marginBottom:16 }}>
          <WPImageMark size={36} variant={t.markColor} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:18, fontWeight:600, letterSpacing:'-0.01em', display:'flex', alignItems:'center', gap:8 }}>
              WPImage
              <span style={{ fontSize:12, fontWeight:500, color:'var(--fg-muted)' }}>v2.8.7</span>
            </div>
            <div style={{ font:'12px/1.4 var(--font-sans)', color:'var(--fg-muted)', marginTop:1 }}>Image compression for WordPress</div>
          </div>
          <div className="wpi-brand-more">
            <button type="button" className="wpi-head-kebab" aria-label="More actions"
              aria-expanded={moreOpen} onClick={()=>setMoreOpen(o=>!o)}><Ic name="more" /></button>
            <div className={'wpi-brand-actions' + (moreOpen ? ' is-open' : '')}>
              <a className="components-button is-tertiary is-small wpi-head-btn" href="#" onClick={e=>{e.preventDefault(); setMoreOpen(false);}}><Ic name="megaphone" cls="sm" />Submit your idea</a>
              <button className={'button button-small wpi-head-btn' + (tab==='support' ? ' is-active' : '')} onClick={()=>{ setTab('support'); setMoreOpen(false); }}><Ic name="lifesaver" cls="sm" />Support</button>
            </div>
          </div>
        </div>
        <div className="components-tab-panel__tabs wpi-tabs" style={{ maxWidth:1080, margin:'0 auto', border:'none' }}>
          {tabs.map(tb => (
            <div key={tb.id} className={'components-tab-panel__tabs-item' + (tab===tb.id ? ' active' : '')} onClick={()=>setTab(tb.id)}
              style={{ display:'flex', alignItems:'center', gap:6 }}>
              <Ic name={tb.icon} cls="sm" />{tb.label}
            </div>
          ))}
        </div>
      </div>

      {tab === 'dashboard' && (
        <DashboardPage t={t} synced={synced} syncing={syncing} openLogin={openLogin} onDisconnect={onDisconnect} />
      )}
      {tab === 'settings' && (
        <SettingsPage compression={compression} setCompression={setCompression} settings={settings} set={set} toggleSize={toggleSize} saving={saving} save={save} dirty={dirty} onReset={resetToDefaults} />
      )}
      {tab === 'plugins' && (
        <PluginsPage fireToast={fireToast} layout={t.pluginLayout} about={t.aboutUs} />
      )}
      {tab === 'support' && (
        <SupportPage fireToast={fireToast} />
      )}

      {toast && (
        <div className="wpi-toast-wrap">
          <div className={`components-snackbar ${toast.leaving ? 'wpi-toast-out' : 'wpi-toast-in'}`}>
            <Ic name="check" cls="sm" style={{ color:'var(--alert-green)', flex:'none' }} />
            <span>{toast.msg}</span>
          </div>
        </div>
      )}

      {window.LoginModal && (
        <window.LoginModal open={loginOpen} mode={authMode} markVariant={t.markColor}
          onClose={() => setLoginOpen(false)} onLogin={onLogin} />
      )}
    </React.Fragment>
  );
}

function App() { return <PluginShell />; }

(function mountWPImage() {
  const el = document.getElementById('wpimage-root');
  if (!el) return;
  el.innerHTML = '';
  ReactDOM.createRoot(el).render(<App />);
})();

</script>
